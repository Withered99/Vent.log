<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent.log | Modded Role Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HOME PAGE VIEW -->
    <div id="catalog-view">
        <header>
            <h1>Vent.log</h1>
            <div class="search-container">
                <!-- Main Search -->
                <input type="text" id="roleSearch" placeholder="Search roles, factions, or mods..." onkeyup="filterAndSort()">
                
                <div class="controls-container">
                    <!-- Sorting Dropdown -->
                    <select id="sortSelect" onchange="filterAndSort()">
                        <!-- Merged Default and Faction -->
                        <option value="default">Sort by: Default</option>
                        <option value="alpha">Sort by: Alphabetical (A-Z)</option>
                    </select>

                    <!-- Tag Filter Container -->
                    <div id="tagFilters">
                        <!-- Filter buttons generated by JS -->
                    </div>
                </div>
            </div>
        </header>

        <main class="role-grid" id="roleGrid">
            <!-- Roles injected by JS -->
        </main>
    </div>

    <!-- ROLE DETAILS VIEW -->
    <div id="detail-view" style="display: none;">
        <div class="detail-container">
            <button class="back-btn" onclick="showCatalog()">← Back to Catalog</button>
            <p>All details are from TOU: Mira (unless stated otherwise) as of this time and may differ between mods</p>
            <p>Also all imposter roles include: Kill, Sabotage, and Vent, while the Crewmates all include Report.</p>
            <div id="role-content">
                <!-- Specific role data injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
